# /etc/nginx/sites-available/api-enquetes
# API Laravel (backend) — servida a partir de /public, com ponte WebSocket para o Reverb.
# (Bloco HTTP; o certbot adiciona o bloco 443/SSL automaticamente.)

server {
    listen 80;
    server_name api-enquetes.SEU-DOMINIO;

    root /var/www/impar-enquetes/backend/public;
    index index.php;

    charset utf-8;
    client_max_body_size 10M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Ponte WebSocket: /app -> processo Reverb interno (porta 8080)
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
