# /etc/nginx/sites-available/enquetes
# Front-end React (build estático do Vite). Fallback SPA para index.html.

server {
    listen 80;
    server_name enquetes.SEU-DOMINIO;

    root /var/www/impar-enquetes/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
